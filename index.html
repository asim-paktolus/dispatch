<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>SCORM Dispatch Launch</title>
    <style>
      html, body { height: 100%; margin: 0; font-family: system-ui, -apple-system, Segoe UI, Roboto, Arial, sans-serif; }
      #shell { height: 100%; display: flex; flex-direction: column; }
      #topbar { padding: 10px 12px; border-bottom: 1px solid #e5e7eb; display:flex; align-items:center; gap:10px; }
      #statusDot { width: 10px; height: 10px; border-radius: 50%; background: #f59e0b; }
      #statusText { font-size: 14px; color: #111827; }
      #frameWrap { flex: 1; min-height: 0; background: #f9fafb; }
      #contentFrame { width: 100%; height: 100%; border: 0; display: none; background: #fff; }
      #error { padding: 16px; color: #991b1b; display: none; }
      #hint { color: #6b7280; font-size: 12px; margin-left: auto; }
    </style>
  </head>
  <body>
    <div id="shell">
      <div id="topbar">
        <div id="statusDot"></div>
        <div id="statusText">Starting…</div>
        <div id="hint">Universal SCORM Dispatch Wrapper</div>
      </div>
      <div id="frameWrap">
        <div id="error"></div>
        <iframe id="contentFrame" title="SCORM Content"></iframe>
      </div>
    </div>

    <script src="js/dispatch-config.js"></script>
    <script src="js/scorm-api-universal.js"></script>
    <script src="js/dispatch-launcher-universal.js"></script>
  </body>
</html>
